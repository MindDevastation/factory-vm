# Factory VM journald retention cap snippet (P0-S2)
# Deploy by copying to /etc/systemd/journald.conf.d/factory-retention.conf
# and reloading journald:
#   sudo mkdir -p /etc/systemd/journald.conf.d
#   sudo cp deploy/systemd/journald-retention.conf /etc/systemd/journald.conf.d/factory-retention.conf
#   sudo systemctl restart systemd-journald

[Journal]
SystemMaxUse=512M
RuntimeMaxUse=128M
MaxRetentionSec=30day
